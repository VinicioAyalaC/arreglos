<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arreglos de Edades</title>
    <link rel="stylesheet" href="arreglos.css">
</head>

<body>

    <main class="contenedor">
        <h1>Gestión de Arreglos de Edades</h1>

        <section class="formulario">
            <input type="number" id="edad" placeholder="Ingrese una edad">
            <button onclick="agregarEdad();">Agregar</button>
        </section>

        <section class="tablas">
            <div class="tabla-contenedor">
                <h2>Arreglo Izquierdo</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Valor</th>
                            <th>Eliminar</th>
                            <th>Mover</th>
                        </tr>
                    </thead>
                    
                    <tbody id="tablaIzquierda">  <!--Tabla izquierda-->
                   
                    </tbody>    <!--cierre Tabla izquierda-->

                </table>
            </div>

            <div class="tabla-contenedor">
                <h2>Arreglo Derecho</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Mover</th>
                            <th>Valor</th>
                            <th>Eliminar</th>
                        </tr>
                    </thead>

                    <tbody id="tablaDerecha">  <!--Tabla derecha-->
                        
                    </tbody>   <!--cierre Tabla derecha-->

                </table>
            </div>
        </section>
        
        <br>  <!--Salto de linea-->
        <br>
        
        <div>
            <button onclick="moverTodoHaciaIzquierda();" >Mover todo a ⬅ </button>
            <button onclick="moverTodoHaciaDerecha();" >Mover todo a ➜ </button>
        </div>

    </main>

    <script src="arreglos.js"></script>
</body>

</html>
